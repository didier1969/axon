# REQ-AXO-901735 — process-compose DAG canonical (dev instance)
#
# Variante dev : binaires debug, ports dev (44139/44149/44137).
# Brain + indexer boot en parallèle (depends_on PG uniquement).
# Tous les env vars hérités du parent (start.sh exporte tout).

version: "0.5"
log_level: info
log_length: 500
is_strict: true
shell:
  shell_command: "bash"
  shell_argument: "-c"

processes:
  postgres-check:
    command: |
      for i in $(seq 1 30); do
        ${AXON_PGREADY_BIN:-pg_isready} -h 127.0.0.1 -p "${PGPORT:-44144}" -q 2>/dev/null && echo "[postgres-check] PG ready" && exit 0
        echo "[postgres-check] waiting for PG on :${PGPORT:-44144}... ($i/30)"
        sleep 2
      done
      echo "[postgres-check] TIMEOUT"
      exit 1
    availability:
      restart: "no"
    is_daemon: false

  # Brain = MCP server (reader IST, writer SOLL). No watcher, no pipeline.
  axon-brain:
    command: "${AXON_BRAIN_BIN:-.axon/cargo-target/debug/axon-brain}"
    working_dir: "."
    environment:
      - "AXON_RUNTIME_MODE=brain_only"
      - "AXON_INSTANCE_KIND=dev"
      - "AXON_BRAIN_PORT=44139"
      # REQ-AXO-901821 — explicit identity stops the brain from inheriting
      # whatever AXON_RUNTIME_* the parent shell exported (which historically
      # left the brain branded as `axon-dev-axon-indexer` because the parent
      # was the indexer launcher). Each role MUST set its own identity here.
      - "AXON_RUNTIME_IDENTITY=axon-dev-axon-brain"
      - "AXON_RUNTIME_SHADOW_ROLE=brain"
      - "AXON_RUNTIME_STATE_FILE=.axon-dev/run-brain/runtime.env"
      - "AXON_RUN_ROOT=.axon-dev/run-brain"
      # REQ-AXO-902064 — promote-written identity file (symmetric to live).
      - "AXON_ACTIVE_IDENTITY_FILE=.axon-dev/active-identity.env"
      # REQ-AXO-901835 — per-process socket paths. Without these explicit
      # overrides, brain inherits AXON_TELEMETRY_SOCK from start.sh which
      # exports a SINGLE path based on the launch mode (full→indexer name).
      # The second process to bind silently `fs::remove_file`s the first
      # one (runtime_boot.rs:743), orphaning brain's listener while the
      # path resolves to indexer's listener. Dashboard then receives raw
      # indexer events but NEVER the dashboard_state_v1 stream emitted
      # by the brain composer — hence "no values".
      - "AXON_TELEMETRY_SOCK=/tmp/axon-dev-brain-telemetry.sock"
      - "AXON_MCP_SOCK=/tmp/axon-dev-brain-mcp.sock"
      - "AXON_DEV_DATABASE_URL=${AXON_DEV_DATABASE_URL:-postgres://axon@127.0.0.1:44144/axon_dev}"
    depends_on:
      postgres-check:
        condition: "process_completed_successfully"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/readyz"
        port: 44139
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 60
    availability:
      restart: "on_failure"
      max_restarts: 3
      # REQ-AXO-902064 — minimal restart backoff (brain exits ~1s on SIGTERM,
      # /readyz ~0.8s) ; symmetric to process-compose.live.yaml.
      backoff_seconds: 1
    shutdown:
      signal: 15
      timeout_seconds: 3

  # Indexer = pipeline (IST writer, SOLL reader). Holds the IST lock.
  axon-indexer:
    command: "${AXON_INDEXER_BIN:-.axon/cargo-target/debug/axon-indexer}"
    working_dir: "."
    # REQ-AXO-901893 — mirror the indexer's stdout/stderr to a stable file so
    # Watchman reconciliation (subscriptions, fresh-instance feeds, clock
    # persistence) is tailable without the process-compose log-buffer lag.
    log_location: "/tmp/axon-dev-indexer.log"
    environment:
      - "AXON_INSTANCE_KIND=dev"
      - "AXON_INDEXER_HEALTH_PORT=44149"
      # REQ-AXO-901821 — explicit identity, see brain block above.
      - "AXON_RUNTIME_IDENTITY=axon-dev-axon-indexer"
      - "AXON_RUNTIME_SHADOW_ROLE=indexer"
      - "AXON_RUNTIME_STATE_FILE=.axon-dev/run-indexer/runtime.env"
      # REQ-AXO-902205 — symmetric to the brain (line ~46) and to the live
      # indexer block: without this, resource_release_identity() (runtime_boot.rs:573)
      # no-ops and the indexer's PG heartbeat reports the frozen process-compose-launch
      # AXON_BUILD_ID instead of the binary it actually runs.
      - "AXON_ACTIVE_IDENTITY_FILE=.axon-dev/active-identity.env"
      - "AXON_RUN_ROOT=.axon-dev/run-indexer"
      # REQ-AXO-901835 — see brain block. Explicit indexer-named sockets
      # prevent collision with brain's listener.
      - "AXON_TELEMETRY_SOCK=/tmp/axon-dev-indexer-telemetry.sock"
      - "AXON_MCP_SOCK=/tmp/axon-dev-indexer-mcp.sock"
      # REQ-AXO-901820 — pipeline tuning. AXON_B2_BATCH_SIZE bump
      # to 192 was reverted : with the observed A-side producer rate
      # (~10 ch/sec post-crash recovery), 192-cap batches never
      # fill and flush on the 200 ms timeout with N << 192, which
      # adds latency without raising utilisation. Default 64 stays
      # until A-side throughput is itself improved (REQ-AXO-901820
      # architectural). A3/B1 worker counts stay tuned because
      # parallelism on the writer / fetcher side is cheap.
      - "AXON_A3_WORKERS=4"
      - "AXON_B1_WORKERS=8"
    depends_on:
      postgres-check:
        condition: "process_completed_successfully"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/readyz"
        port: 44149
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 120
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 10
    shutdown:
      signal: 15
      timeout_seconds: 15

  dashboard:
    # REQ-AXO-901830 — pre-compile deps + clean stale locks BEFORE
    # `mix phx.server` so the BEAM application boots in seconds
    # instead of holding the compile phase for several minutes. The
    # earlier symptom (probe failure after 126 s → kill → stale
    # `_build/.../mix/compile.lock` wedging every restart) was driven
    # by process-compose killing a still-compiling BEAM that left
    # behind a lock pointing at a now-dead PID. Pre-compile eliminates
    # the long compile from the Phoenix start path so the bandit
    # listener binds well within any reasonable probe window.
    command: |
      cd src/dashboard
      find _build -name 'compile.lock' -delete 2>/dev/null || true
      mix compile >/dev/null 2>&1 || true
      exec elixir \
        --name "${ELIXIR_NODE_NAME:-axon_dev}@127.0.0.1" \
        --cookie "${AXON_ERLANG_COOKIE}" \
        -S mix phx.server
    working_dir: "."
    environment:
      - "AXON_INSTANCE_KIND=dev"
      # REQ-AXO-901822 — canonical PHX_PORT comes from
      # scripts/lib/axon-instance.sh (dev=44137 / live=44127).
      - "PHX_PORT=${PHX_PORT}"
    depends_on:
      axon-brain:
        condition: "process_healthy"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/"
        port: 44137
      # Pre-compile reduces Phoenix start from ~3 min to ~30 s.
      # 60 s initial_delay + 30 × 10 s = 360 s leaves room for
      # cold-disk variants without re-introducing the kill cycle.
      initial_delay_seconds: 60
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 30
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 5
    shutdown:
      signal: 15
      timeout_seconds: 15
    disabled: ${AXON_DASHBOARD_DISABLED:-false}
