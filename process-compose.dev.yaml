# REQ-AXO-901735 — process-compose DAG canonical (dev instance)
#
# Variante dev : binaires debug, ports dev (44139/44149/44137).
# Brain + indexer boot en parallèle (depends_on PG uniquement).
# Tous les env vars hérités du parent (start.sh exporte tout).

version: "0.5"
log_level: info
log_length: 500
is_strict: true
shell:
  shell_command: "bash"
  shell_argument: "-c"

processes:
  postgres-check:
    command: |
      for i in $(seq 1 30); do
        ${AXON_PGREADY_BIN:-pg_isready} -h 127.0.0.1 -p "${PGPORT:-44144}" -q 2>/dev/null && echo "[postgres-check] PG ready" && exit 0
        echo "[postgres-check] waiting for PG on :${PGPORT:-44144}... ($i/30)"
        sleep 2
      done
      echo "[postgres-check] TIMEOUT"
      exit 1
    availability:
      restart: "no"
    is_daemon: false

  # Brain = MCP server (reader IST, writer SOLL). No watcher, no pipeline.
  axon-brain:
    command: "${AXON_BRAIN_BIN:-.axon/cargo-target/debug/axon-brain}"
    working_dir: "."
    environment:
      - "AXON_RUNTIME_MODE=brain_only"
      - "AXON_INSTANCE_KIND=dev"
    depends_on:
      postgres-check:
        condition: "process_completed_successfully"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/livez"
        port: 44139
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 60
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 5
    shutdown:
      signal: 15
      timeout_seconds: 30

  # Indexer = pipeline (IST writer, SOLL reader). Holds the IST lock.
  axon-indexer:
    command: "${AXON_INDEXER_BIN:-.axon/cargo-target/debug/axon-indexer}"
    working_dir: "."
    environment:
      - "AXON_INSTANCE_KIND=dev"
    depends_on:
      postgres-check:
        condition: "process_completed_successfully"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/readyz"
        port: 44149
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 120
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 10
    shutdown:
      signal: 15
      timeout_seconds: 60

  dashboard:
    command: |
      cd src/dashboard
      exec elixir \
        --name "${ELIXIR_NODE_NAME:-axon_dev}@127.0.0.1" \
        --cookie "${AXON_ERLANG_COOKIE}" \
        -S mix phx.server
    working_dir: "."
    environment:
      - "AXON_INSTANCE_KIND=dev"
    depends_on:
      axon-brain:
        condition: "process_healthy"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/"
        port: 44137
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 5
    shutdown:
      signal: 15
      timeout_seconds: 15
    disabled: ${AXON_DASHBOARD_DISABLED:-false}
