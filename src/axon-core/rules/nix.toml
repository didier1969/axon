[meta]
language = "nix"
file_extensions = ["nix"]

[[rules]]
id = "env_var_assign"
pattern = '([A-Z_][A-Z0-9_]{3,})\s*='
phantom_kind = "env_var"
edge_type = "DECLARES"
min_length = 4
exclude_patterns = ["^(EOF|OK|NO|YES|NULL|TRUE|FALSE)$"]

[[rules]]
id = "soll_reference"
pattern = '((?:REQ|DEC|CPT|MIL|PIL|GUI|VIS|VAL|SKI|PRT)-[A-Z][A-Z0-9]{2}-\d{3,})'
phantom_kind = "soll_ref"
edge_type = "IMPLEMENTS"
min_length = 10
