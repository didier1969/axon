[package]
name = "axon-core"
version = "2.0.0"
edition = "2021"

[dependencies]
tokio = { version = "1.36", features = ["full", "net"] }
ignore = "0.4"
tree-sitter = "0.20"
tree-sitter-python = "0.20"
tree-sitter-elixir = "0.2"
serde = { version = "1.0", features = ["derive"] }
rmp-serde = "1.1"
anyhow = "1.0"
rayon = "1.8"

[dev-dependencies]
tempfile = "3.8"
