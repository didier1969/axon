[package]
name = "axon-core"
version = "2.0.0"
edition = "2021"

[dependencies]
tokio = { version = "1.36", features = ["full", "net"] }
ignore = "0.4"
tree-sitter = "0.23"
tree-sitter-python = "0.23"
tree-sitter-elixir = "0.3"
tree-sitter-rust = "0.23"
tree-sitter-typescript = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-go = "0.23"
tree-sitter-java = "0.23"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmp-serde = "1.1"
anyhow = "1.0"
rayon = "1.8"
yyjson = "0.1.0"
libloading = "0.8.1"
tree-sitter-html = "0.23"
tree-sitter-css = "0.23"
tree-sitter-md = "0.3"
tree-sitter-yaml = "0.7"
log = "0.4"
env_logger = "0.10"
chrono = "0.4"
regex = "1.12.3"

[dev-dependencies]
tempfile = "3.8"

[build-dependencies]
cc = "1.2"
cmake = "0.1.57"
cxx-build = "1.0.138"
