[package]
name = "axon-core"
version = "2.0.0"
edition = "2021"

[dependencies]
tokio = { version = "1.36", features = ["full", "net"] }
walkdir = "2.5"
ignore = "0.4"
notify-debouncer-full = "0.7.0"
tree-sitter = { version = "0.23", features = ["wasm"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmp-serde = "1.1"
anyhow = "1.0"
rayon = "1.8"
yyjson = "0.1.0"
libloading = "0.8.1"
log = "0.4"
env_logger = "0.10"
chrono = "0.4"
regex = "1.12.3"
fastembed = "5.12.1"
ort = "2.0.0-rc.11"
once_cell = "1.21.4"
tempfile = "3.8"
wasmtime = "24.0.0"
toml = "0.8"
axum = "0.8.8"
tokio-stream = "0.1.18"
futures-util = "0.3.32"
crossbeam-channel = "0.5.15"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
parking_lot = "0.12.5"
async-trait = "0.1"
rusqlite = { version = "0.39.0", features = ["bundled"] }

[dev-dependencies]
rand = "0.8"
tempfile = "3.8"
tower = { version = "0.5.3", features = ["util"] }
