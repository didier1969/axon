# REQ-AXO-901735 — process-compose DAG canonical (live instance)
#
# Supervision déclarative : probes k8s-style, restart on_failure, shutdown ordonné.
# Tous les env vars sont hérités du parent (start.sh exporte tout avant exec).
# Ce YAML ne déclare que les overrides per-process et les probes.
#
# Usage : process-compose up -f process-compose.live.yaml [process-names...]
#   brain seul   : process-compose up -f ... axon-brain
#   brain+indexer: process-compose up -f ... axon-brain axon-indexer
#   tout         : process-compose up -f ... (démarre tout y compris dashboard)
# Les dépendances (postgres-check) sont résolues automatiquement.

version: "0.5"
log_level: info
log_length: 500
is_strict: true
shell:
  shell_command: "bash"
  shell_argument: "-c"

processes:
  postgres-check:
    command: |
      for i in $(seq 1 30); do
        ${AXON_PGREADY_BIN:-pg_isready} -h 127.0.0.1 -p "${PGPORT:-44144}" -q 2>/dev/null && echo "[postgres-check] PG ready" && exit 0
        echo "[postgres-check] waiting for PG on :${PGPORT:-44144}... ($i/30)"
        sleep 2
      done
      echo "[postgres-check] TIMEOUT"
      exit 1
    availability:
      restart: "no"
    is_daemon: false

  axon-brain:
    command: "${AXON_BRAIN_BIN:-bin/axon-brain}"
    working_dir: "."
    environment:
      - "AXON_RUNTIME_MODE=brain_only"
      - "AXON_INSTANCE_KIND=live"
      - "AXON_LIVE_DATABASE_URL=${AXON_LIVE_DATABASE_URL:-postgres://axon@127.0.0.1:44144/axon_live}"
    depends_on:
      postgres-check:
        condition: "process_completed_successfully"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/readyz"
        port: 44129
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 20
    liveness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/livez"
        port: 44129
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 5
    shutdown:
      signal: 15
      timeout_seconds: 30

  axon-indexer:
    command: "${AXON_INDEXER_BIN:-bin/axon-indexer}"
    working_dir: "."
    environment:
      - "AXON_RUNTIME_MODE=${AXON_INDEXER_MODE:-indexer_full}"
      - "AXON_RUNTIME_SHADOW_ROLE=indexer"
      - "AXON_INSTANCE_KIND=live"
    depends_on:
      postgres-check:
        condition: "process_completed_successfully"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/readyz"
        port: 44139
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 60
    liveness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/livez"
        port: 44139
      initial_delay_seconds: 120
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 10
    shutdown:
      signal: 15
      timeout_seconds: 60

  dashboard:
    command: |
      cd src/dashboard
      exec elixir \
        --name "${ELIXIR_NODE_NAME:-axon_live}@127.0.0.1" \
        --cookie "${AXON_ERLANG_COOKIE}" \
        -S mix phx.server
    working_dir: "."
    environment:
      - "AXON_INSTANCE_KIND=live"
    depends_on:
      axon-brain:
        condition: "process_healthy"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/"
        port: 44127
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 5
    shutdown:
      signal: 15
      timeout_seconds: 15
    disabled: ${AXON_DASHBOARD_DISABLED:-false}
