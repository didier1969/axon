# REQ-AXO-901735 — process-compose DAG canonical (live instance)
#
# Supervision déclarative : probes k8s-style, restart on_failure, shutdown ordonné.
# Tous les env vars sont hérités du parent (start.sh exporte tout avant exec).
# Ce YAML ne déclare que les overrides per-process et les probes.
#
# Usage : process-compose up -f process-compose.live.yaml [process-names...]
#   brain seul   : process-compose up -f ... axon-brain
#   brain+indexer: process-compose up -f ... axon-brain axon-indexer
#   tout         : process-compose up -f ... (démarre tout y compris dashboard)
# Les dépendances (postgres-check) sont résolues automatiquement.

version: "0.5"
log_level: info
log_length: 500
is_strict: true
shell:
  shell_command: "bash"
  shell_argument: "-c"

processes:
  postgres-check:
    command: |
      for i in $(seq 1 30); do
        ${AXON_PGREADY_BIN:-pg_isready} -h 127.0.0.1 -p "${PGPORT:-44144}" -q 2>/dev/null && echo "[postgres-check] PG ready" && exit 0
        echo "[postgres-check] waiting for PG on :${PGPORT:-44144}... ($i/30)"
        sleep 2
      done
      echo "[postgres-check] TIMEOUT"
      exit 1
    availability:
      restart: "no"
    is_daemon: false

  axon-brain:
    command: "${AXON_BRAIN_BIN:-bin/axon-brain}"
    working_dir: "."
    environment:
      - "AXON_RUNTIME_MODE=brain_only"
      - "AXON_INSTANCE_KIND=live"
      # RAM IST snapshot: no explicit toggle needed — the promoted binary is
      # default-ON (REQ-AXO-901951, cache.rs::is_enabled). The toggle itself is
      # being removed entirely in favour of a single RAM source for both graphs
      # (REQ-AXO-901952). Setting AXON_IST_RAM_ENABLED here would be redundant.
      # REQ-AXO-901821 — explicit identity stops the brain from inheriting
      # whatever AXON_RUNTIME_* the parent shell exported. Each role MUST
      # set its own identity here ; symmetric to process-compose.dev.yaml.
      - "AXON_RUNTIME_IDENTITY=axon-live-axon-brain"
      - "AXON_RUNTIME_SHADOW_ROLE=brain"
      - "AXON_RUN_ROOT=.axon/run-brain"
      # REQ-AXO-902064 — promote-written identity file; the brain re-sources its
      # build_id/install_generation from it so an in-place `process restart`
      # (frozen daemon env) still reports the PROMOTED identity (PIL-AXO-005).
      - "AXON_ACTIVE_IDENTITY_FILE=.axon/live-release/active-identity.env"
      - "AXON_LIVE_DATABASE_URL=${AXON_LIVE_DATABASE_URL:-postgres://axon@127.0.0.1:44144/axon_live}"
      # REQ-AXO-901835 — explicit per-process sockets (cf. dev YAML pour
      # le diagnostic complet). Sans cette override, brain et indexer
      # entrent en collision sur le même socket exporté par start.sh.
      - "AXON_TELEMETRY_SOCK=/tmp/axon-live-brain-telemetry.sock"
      - "AXON_MCP_SOCK=/tmp/axon-live-brain-mcp.sock"
    depends_on:
      postgres-check:
        condition: "process_completed_successfully"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/readyz"
        port: 44129
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 20
    liveness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/livez"
        port: 44129
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    availability:
      restart: "on_failure"
      max_restarts: 3
      # REQ-AXO-902064 — minimal restart backoff: the brain exits cleanly on
      # SIGTERM in ~1s (WriterGuard Drop releases the SOLL lock) and reaches
      # /readyz in ~0.8s, so a 5s backoff only inflated promote/restart MCP
      # downtime (and made repeated restarts accumulate delay). 1s keeps light
      # crash-loop protection (bounded anyway by max_restarts).
      backoff_seconds: 1
    shutdown:
      signal: 15
      # REQ-AXO-902064 — the brain terminates in ~1s on SIGTERM; a 10s grace
      # only stretched the restart stop-phase. 3s is ample headroom for a clean
      # lock release + flush before the (rare) SIGKILL.
      timeout_seconds: 3

  axon-indexer:
    command: "${AXON_INDEXER_BIN:-bin/axon-indexer}"
    working_dir: "."
    environment:
      - "AXON_RUNTIME_MODE=${AXON_INDEXER_MODE:-indexer_full}"
      - "AXON_RUNTIME_SHADOW_ROLE=indexer"
      - "AXON_INSTANCE_KIND=live"
      - "AXON_INDEXER_HEALTH_PORT=44130"
      # REQ-AXO-901821 — explicit identity, symmetric to brain block above.
      - "AXON_RUNTIME_IDENTITY=axon-live-axon-indexer"
      - "AXON_RUN_ROOT=.axon/run-indexer"
      # REQ-AXO-901835 — explicit per-process sockets (cf. brain block).
      - "AXON_TELEMETRY_SOCK=/tmp/axon-live-indexer-telemetry.sock"
      - "AXON_MCP_SOCK=/tmp/axon-live-indexer-mcp.sock"
      # REQ-AXO-901895 interim — parallelise the chunk stage (the tokenizer-per-
      # symbol cost in A3 is the re-index bottleneck) until the cheap-estimate
      # fix lands. Host has the cores; A3 chunking is CPU-bound + idempotent.
      - "AXON_A3_WORKERS=16"
      - "AXON_A2_WORKERS=12"
    depends_on:
      postgres-check:
        condition: "process_completed_successfully"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/readyz"
        port: 44130
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 60
    liveness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/livez"
        port: 44130
      initial_delay_seconds: 120
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 10
    shutdown:
      signal: 15
      timeout_seconds: 15

  dashboard:
    command: |
      cd src/dashboard
      exec elixir \
        --name "${ELIXIR_NODE_NAME:-axon_live}@127.0.0.1" \
        --cookie "${AXON_ERLANG_COOKIE}" \
        -S mix phx.server
    working_dir: "."
    environment:
      - "AXON_INSTANCE_KIND=live"
      # REQ-AXO-901822 — PHX_PORT for Phoenix comes from
      # axon-instance.sh (live=44127). probe `port:` stays literal
      # because process-compose does not env-expand integer fields ;
      # keep in lockstep with the live branch of axon-instance.sh.
      - "PHX_PORT=${PHX_PORT}"
    depends_on:
      axon-brain:
        condition: "process_healthy"
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        scheme: "http"
        path: "/"
        port: 44127
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12
    availability:
      restart: "on_failure"
      max_restarts: 3
      backoff_seconds: 5
    shutdown:
      signal: 15
      timeout_seconds: 15
    disabled: ${AXON_DASHBOARD_DISABLED:-false}
